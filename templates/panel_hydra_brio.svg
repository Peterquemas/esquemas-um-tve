  <circle cx="90" cy="80" r="7" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="88" cy="81" r="1.2" fill="black"/><circle cx="92" cy="81" r="1.2" fill="black"/><circle cx="90" cy="78" r="1.2" fill="black"/>
