  <circle cx="186" cy="28" r="3" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="186" y="40" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">3</text>
  <!-- Fila 2 -->
  <circle cx="152" cy="54" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="152" cy="54" r="3" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="152" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">4</text>
  <circle cx="169" cy="54" r="7" fill="none" stroke="black" stroke-width="1.5"/>
