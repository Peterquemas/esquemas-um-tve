  <text x="169" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">5</text>
  <circle cx="186" cy="54" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="186" cy="54" r="3" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="186" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">6</text>
