  <circle cx="90" cy="28" r="7" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="88" cy="29" r="1.2" fill="black"/><circle cx="92" cy="29" r="1.2" fill="black"/><circle cx="90" cy="26" r="1.2" fill="black"/>
