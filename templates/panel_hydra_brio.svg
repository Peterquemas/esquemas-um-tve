<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130">
  <!-- Rack frame 4U estilo Calrec Br.IO -->
  <rect x="2" y="2" width="216" height="126" rx="3" fill="white" stroke="black" stroke-width="2"/>
