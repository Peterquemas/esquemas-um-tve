  <circle cx="169" cy="80" r="3" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="169" y="92" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">8</text>
  <circle cx="186" cy="80" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="186" cy="80" r="3" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="186" y="92" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">9</text>
  <text x="170" y="118" text-anchor="middle" font-size="4.5" font-family="Arial,sans-serif" fill="black">Entradas Analógicas</text>

  <!-- === Red / IP panel derecho === -->
  <rect x="202" y="5" width="14" height="120" rx="2" fill="none" stroke="black" stroke-width="0.8"/>
  <!-- Puerto RJ45/etherCON -->
  <rect x="204" y="20" width="10" height="8" rx="1" fill="none" stroke="black" stroke-width="1"/>
  <!-- Antena WiFi símbolo -->
  <path d="M209 40 Q209 35 209 32" stroke="black" stroke-width="1" fill="none"/>
  <path d="M205 38 Q205 30 209 28 Q213 30 213 38" fill="none" stroke="black" stroke-width="0.8"/>
  <path d="M203 42 Q203 29 209 26 Q215 29 215 42" fill="none" stroke="black" stroke-width="0.6"/>
  <!-- Conector BNC red -->
  <circle cx="209" cy="65" r="4" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="209" cy="65" r="1.5" fill="none" stroke="black" stroke-width="0.8"/>
  <!-- LED status -->
  <circle cx="209" cy="80" r="2" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="209" cy="87" r="2" fill="none" stroke="black" stroke-width="1"/>
  <text x="70" y="128" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="black">Panel Hydra (Calrec Br.IO)</text>
</svg>
