  <text x="38" y="80" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">3</text>
  <circle cx="38" cy="92" r="5" fill="none" stroke="black" stroke-width="1.2"/><circle cx="38" cy="92" r="2" fill="none" stroke="black" stroke-width="0.8"/>
