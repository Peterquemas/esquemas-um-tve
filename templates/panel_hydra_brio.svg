  <text x="124" y="92" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">9</text>
  <text x="108" y="118" text-anchor="middle" font-size="4.5" font-family="Arial,sans-serif" fill="black">Salidas Analógicas</text>

  <!-- === SECCIÓN XLR ENTRADAS (hembra) 8ch === -->
