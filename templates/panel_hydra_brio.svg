  <circle cx="88" cy="55" r="1.2" fill="black"/><circle cx="92" cy="55" r="1.2" fill="black"/><circle cx="90" cy="52" r="1.2" fill="black"/>
  <text x="90" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">4</text>
  <circle cx="107" cy="54" r="7" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="105" cy="55" r="1.2" fill="black"/><circle cx="109" cy="55" r="1.2" fill="black"/><circle cx="107" cy="52" r="1.2" fill="black"/>
  <text x="107" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">5</text>
  <circle cx="124" cy="54" r="7" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="122" cy="55" r="1.2" fill="black"/><circle cx="126" cy="55" r="1.2" fill="black"/><circle cx="124" cy="52" r="1.2" fill="black"/>
  <text x="124" y="66" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">6</text>
