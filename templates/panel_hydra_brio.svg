  <text x="14" y="65" text-anchor="middle" font-size="8" font-family="Arial,sans-serif" fill="black" transform="rotate(-90,14,65)">HYDRA NET</text>

  <!-- === SECCIÓN AES/DIGITAL izquierda === -->
  <rect x="26" y="5" width="50" height="120" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="51" y="14" text-anchor="middle" font-size="5.5" font-family="Arial,sans-serif" fill="black">AES3 / Digital</text>
  <!-- 8 BNC (4x2) -->
  <!-- Columna 1 -->
  <circle cx="38" cy="26" r="5" fill="none" stroke="black" stroke-width="1.2"/><circle cx="38" cy="26" r="2" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="38" y="36" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">1</text>
