<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90">
  <!-- Rack frame 2U -->
  <rect x="2" y="2" width="196" height="86" rx="3" fill="white" stroke="black" stroke-width="2"/>
  <!-- Etiqueta lateral -->
  <rect x="5" y="5" width="16" height="80" rx="2" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="13" y="45" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="black" transform="rotate(-90,13,45)">ANALOGUE</text>
  <!-- Panel interior -->
  <rect x="24" y="5" width="170" height="80" rx="1" fill="none" stroke="black" stroke-width="0.5"/>
  
  <!-- Label top -->
  <text x="109" y="15" text-anchor="middle" font-size="6" font-family="Arial,sans-serif" fill="black">Analogue I/O · 16 canales XLR</text>
  
  <!-- 8 XLR hembra (entradas) fila superior, numerados 1-8 -->
  <text x="35" y="24" text-anchor="middle" font-size="4.5" font-family="Arial,sans-serif" fill="black">IN</text>
  <!-- XLR-F iconos fila 1 (círculo + círculo interior = hembra) -->
  <circle cx="35" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="35" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="35" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">1</text>
  <circle cx="55" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="55" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="55" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">2</text>
  <circle cx="75" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="75" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="75" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">3</text>
  <circle cx="95" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="95" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="95" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">4</text>
  <circle cx="115" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="115" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="115" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">5</text>
  <circle cx="135" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="135" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="135" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">6</text>
  <circle cx="155" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="155" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="155" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">7</text>
  <circle cx="175" cy="37" r="8" fill="none" stroke="black" stroke-width="1.5"/><circle cx="175" cy="37" r="3.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="175" y="50" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">8</text>

  <!-- 8 XLR macho (salidas) fila inferior, numerados 9-16 -->
  <text x="35" y="57" text-anchor="middle" font-size="4.5" font-family="Arial,sans-serif" fill="black">OUT</text>
  <!-- XLR-M iconos fila 2 (círculo + 3 pines triangulares = macho) -->
  <circle cx="35" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="33" cy="69" r="1.3" fill="black"/><circle cx="37" cy="69" r="1.3" fill="black"/><circle cx="35" cy="66" r="1.3" fill="black"/>
  <text x="35" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">9</text>
  <circle cx="55" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="53" cy="69" r="1.3" fill="black"/><circle cx="57" cy="69" r="1.3" fill="black"/><circle cx="55" cy="66" r="1.3" fill="black"/>
  <text x="55" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">10</text>
  <circle cx="75" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="73" cy="69" r="1.3" fill="black"/><circle cx="77" cy="69" r="1.3" fill="black"/><circle cx="75" cy="66" r="1.3" fill="black"/>
  <text x="75" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">11</text>
  <circle cx="95" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="93" cy="69" r="1.3" fill="black"/><circle cx="97" cy="69" r="1.3" fill="black"/><circle cx="95" cy="66" r="1.3" fill="black"/>
  <text x="95" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">12</text>
  <circle cx="115" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="113" cy="69" r="1.3" fill="black"/><circle cx="117" cy="69" r="1.3" fill="black"/><circle cx="115" cy="66" r="1.3" fill="black"/>
  <text x="115" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">13</text>
  <circle cx="135" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="133" cy="69" r="1.3" fill="black"/><circle cx="137" cy="69" r="1.3" fill="black"/><circle cx="135" cy="66" r="1.3" fill="black"/>
  <text x="135" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">14</text>
  <circle cx="155" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="153" cy="69" r="1.3" fill="black"/><circle cx="157" cy="69" r="1.3" fill="black"/><circle cx="155" cy="66" r="1.3" fill="black"/>
  <text x="155" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">15</text>
  <circle cx="175" cy="68" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="173" cy="69" r="1.3" fill="black"/><circle cx="177" cy="69" r="1.3" fill="black"/><circle cx="175" cy="66" r="1.3" fill="black"/>
  <text x="175" y="81" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">16</text>
</svg>
