<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Stagebox - caja de campo -->
  <rect x="5" y="8" width="90" height="54" rx="4" fill="white" stroke="black" stroke-width="2"/>
  <!-- Bisagras / esquinas reforzadas -->
  <rect x="5" y="8" width="8" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="87" y="8" width="8" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="5" y="54" width="8" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="87" y="54" width="8" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <!-- Panel frontal -->
  <rect x="12" y="14" width="76" height="42" rx="2" fill="none" stroke="black" stroke-width="0.8"/>
  <!-- Label -->
  <text x="50" y="22" text-anchor="middle" font-size="5.5" font-family="Arial,sans-serif" fill="black">CAJA CONEXIÓN</text>
  <!-- Asa superior -->
  <path d="M35 8 Q35 2 50 2 Q65 2 65 8" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- 8 XLR hembra (2 filas x 4) -->
  <circle cx="24" cy="34" r="6" fill="none" stroke="black" stroke-width="1.5"/><circle cx="24" cy="34" r="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="24" y="44" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">1</text>
  <circle cx="38" cy="34" r="6" fill="none" stroke="black" stroke-width="1.5"/><circle cx="38" cy="34" r="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="38" y="44" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">2</text>
  <circle cx="52" cy="34" r="6" fill="none" stroke="black" stroke-width="1.5"/><circle cx="52" cy="34" r="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="52" y="44" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">3</text>
  <circle cx="66" cy="34" r="6" fill="none" stroke="black" stroke-width="1.5"/><circle cx="66" cy="34" r="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="66" y="44" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">4</text>
  <circle cx="80" cy="34" r="6" fill="none" stroke="black" stroke-width="1.5"/><circle cx="80" cy="34" r="2.5" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="80" y="44" text-anchor="middle" font-size="4" font-family="Arial,sans-serif" fill="black">5</text>
  <!-- LED indicador + cable multicore salida -->
  <circle cx="17" cy="27" r="2.5" fill="none" stroke="black" stroke-width="1"/>
  <!-- Cable multicore lateral -->
  <line x1="95" y1="35" x2="100" y2="35" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <text x="50" y="73" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="black">Caja de Conexión</text>
</svg>
