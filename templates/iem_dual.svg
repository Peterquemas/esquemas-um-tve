<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90">
  <!-- Unidad base - chasis rack 2U -->
  <rect x="2" y="5" width="136" height="60" rx="3" fill="white" stroke="black" stroke-width="2"/>
  <!-- Panel frontal interior -->
  <rect x="7" y="10" width="126" height="50" rx="2" fill="white" stroke="black" stroke-width="0.8"/>
  
  <!-- Pantalla LCD canal A -->
  <rect x="12" y="14" width="36" height="14" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <text x="30" y="24" text-anchor="middle" font-size="6" font-family="Arial Narrow,Arial,monospace" fill="black">CH A -18dB</text>
  
  <!-- Pantalla LCD canal B -->
  <rect x="52" y="14" width="36" height="14" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <text x="70" y="24" text-anchor="middle" font-size="6" font-family="Arial Narrow,Arial,monospace" fill="black">CH B -14dB</text>
  
  <!-- Encoder volumen A -->
  <circle cx="26" cy="40" r="9" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="26" cy="40" r="5" fill="none" stroke="black" stroke-width="0.8"/>
  <line x1="26" y1="31" x2="26" y2="35" stroke="black" stroke-width="1.5"/>
  <text x="26" y="55" text-anchor="middle" font-size="5" font-family="Arial,sans-serif" fill="black">VOL A</text>
  
  <!-- Encoder volumen B -->
  <circle cx="66" cy="40" r="9" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="66" cy="40" r="5" fill="none" stroke="black" stroke-width="0.8"/>
  <line x1="66" y1="31" x2="66" y2="35" stroke="black" stroke-width="1.5"/>
  <text x="66" y="55" text-anchor="middle" font-size="5" font-family="Arial,sans-serif" fill="black">VOL B</text>
  
  <!-- Jack salida IEM A (6.35mm) -->
  <circle cx="95" cy="30" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="95" cy="30" r="2.5" fill="none" stroke="black" stroke-width="1"/>
  <text x="95" y="45" text-anchor="middle" font-size="5" font-family="Arial,sans-serif" fill="black">IEM A</text>
  
  <!-- Jack salida IEM B (6.35mm) -->
  <circle cx="115" cy="30" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="115" cy="30" r="2.5" fill="none" stroke="black" stroke-width="1"/>
  <text x="115" y="45" text-anchor="middle" font-size="5" font-family="Arial,sans-serif" fill="black">IEM B</text>

  <!-- Botón RF/Link -->
  <rect x="92" y="47" width="30" height="10" rx="2" fill="none" stroke="black" stroke-width="1"/>
  <text x="107" y="55" text-anchor="middle" font-size="5" font-family="Arial,sans-serif" fill="black">RF LINK</text>

  <!-- Orejas de rack -->
  <rect x="2" y="12" width="5" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="133" y="12" width="5" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="2" y="45" width="5" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="133" y="45" width="5" height="8" rx="1" fill="none" stroke="black" stroke-width="0.8"/>
  
  <text x="70" y="80" text-anchor="middle" font-size="7.5" font-family="Arial,sans-serif" fill="black">Base IEM Dual</text>
</svg>
